# SODA Phase Pipeline Configuration
#
# Each phase defines: prompt template, output schema, tool scope,
# timeout, retry policy, and dependencies on previous phase artifacts.

phases:
  - name: triage
    prompt: prompts/triage.md
    # schema: generated from schemas.TriageOutput (go generate ./schemas/...)
    tools:
      - Read
      - Glob
      - Grep
      - Bash(git:*)
      - Bash(ls:*)
    timeout: 3m
    retry:
      transient: 2
      parse: 1
      semantic: 1
    depends_on: []

  - name: plan
    prompt: prompts/plan.md
    # schema: generated from schemas.PlanOutput (go generate ./schemas/...)
    # condition: Go text/template evaluated at runtime; output "false" skips
    # the phase. Available fields: .Complexity, .Automatable, .ReworkCycle.
    # Example: skip plan for low-complexity tickets:
    # condition: '{{ ne .Complexity "low" }}'
    tools:
      - Read
      - Glob
      - Grep
      - Bash(git:*)
      - Bash(ls:*)
    timeout: 8m
    retry:
      transient: 2
      parse: 1
      semantic: 1
    depends_on:
      - triage

  - name: implement
    prompt: prompts/implement.md
    # schema: generated from schemas.ImplementOutput (go generate ./schemas/...)
    model: claude-opus-4-6
    tools:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - Bash
    timeout: 25m
    # timeout_overrides: evaluate conditions in order; first match overrides the base timeout.
    # Conditions use Go text/template syntax. Available fields: .Complexity, .Automatable, .ReworkCycle.
    # NOTE: use {{ eq .Complexity "low" }}, NOT {{ .Complexity == "low" }} (invalid Go template).
    # timeout_overrides:
    #   - condition: '{{ eq .Complexity "low" }}'
    #     timeout: 10m
    #   - condition: '{{ eq .Complexity "medium" }}'
    #     timeout: 20m
    retry:
      transient: 2
      parse: 1
      semantic: 0    # don't retry semantic failures — human decides
    depends_on:
      - plan
    feedback_from:
      - review
      - verify

  - name: patch
    type: corrective
    prompt: prompts/patch.md
    model: claude-sonnet-4-6
    # schema: generated from schemas.PatchOutput (go generate ./schemas/...)
    tools:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - Bash
    timeout: 8m
    retry:
      transient: 2
      parse: 1
      semantic: 0
    depends_on:
      - implement
    feedback_from:
      - verify

  - name: verify
    prompt: prompts/verify.md
    # schema: generated from schemas.VerifyOutput (go generate ./schemas/...)
    tools:
      - Read
      - Glob
      - Grep
      - Bash
    timeout: 8m
    retry:
      transient: 2
      parse: 1
      semantic: 1
    corrective:
      phase: patch
      max_attempts: 2
      on_exhausted: stop
      escalate_to: implement
    depends_on:
      - plan
      - implement

  - name: review
    type: parallel-review
    # schema: generated from schemas.ReviewOutput (go generate ./schemas/...)
    model: claude-opus-4-6
    tools:
      - Read
      - Glob
      - Grep
      - Bash
    timeout: 12m
    retry:
      transient: 2
      parse: 1
      semantic: 1
    depends_on:
      - plan
      - implement
      - verify
    min_reviewers: 1  # phase succeeds if at least 1 reviewer passes; tolerate partial failures
    reviewers:
      - name: go-specialist
        prompt: prompts/review-go.md
        focus: "Go idioms, error handling, interface design, test quality, performance"
      - name: ai-harness
        prompt: prompts/review-harness.md
        focus: "prompt engineering, context budget, Claude CLI integration, sandbox, structured output"
        condition: '{{ ne .Complexity "low" }}'
    reviewer_stagger: 5s
    rework:
      target: implement
    # Routing: critical/major → rework (route back to target),
    # minor → follow-up (proceed to submit, queue follow-up phase),
    # none → pass (proceed to submit).
    # Max rework cycles is configured in EngineConfig (default: 2).

  - name: submit
    prompt: prompts/submit.md
    # schema: generated from schemas.SubmitOutput (go generate ./schemas/...)
    tools:
      - Bash(git:*)
      - Bash(gh:*)
      - Bash(glab:*)
    timeout: 3m
    retry:
      transient: 2
      parse: 1
      semantic: 0
    depends_on:
      - implement
      - verify
      - review

  - name: monitor
    prompt: prompts/monitor.md
    # schema: generated from schemas.MonitorOutput (go generate ./schemas/...)
    type: polling     # not one-shot
    tools:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - Bash
    timeout: 10m      # per-response session timeout
    polling:
      initial_interval: 2m
      max_interval: 5m
      escalate_after: 30m
      max_duration: 4h
      max_response_rounds: 3
    retry:
      transient: 2
      parse: 1
      semantic: 0
    depends_on:
      - submit
      - plan
