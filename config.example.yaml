# ~/.config/soda/config.yaml
# Generate a starter config with: soda init

# Ticket source
ticket_source: jira
jira:
  command: wtmcp
  project: MYPROJECT
  query: "labels = ai-workable AND status = Refinement"

# GitHub Issues source (alternative to Jira)
# github:
#   owner: myorg
#   repo: my-service
#   fetch_comments: true
#   # Extraction strategies: pull spec/plan from ticket comments using markers.
#   # When configured, comments are scanned for content between start/end markers.
#   # If multiple comments contain the same markers, the last one wins.
#   spec:
#     start_marker: "<!-- spec:start -->"
#     end_marker: "<!-- spec:end -->"
#   plan:
#     start_marker: "<!-- plan:start -->"
#     end_marker: "<!-- plan:end -->"

# Default execution mode
mode: autonomous   # or "checkpoint"

# Model (used for all phases in v1)
model: claude-opus-4-6

# Sandbox (via agentic-orchestrator)
sandbox:
  enabled: true
  binary: agent-node
  limits:
    memory_mb: 2048
    cpu_percent: 200
    max_pids: 256

# Budget
limits:
  max_cost_per_ticket: 15.00
  max_cost_per_phase: 8.00

# Worktrees
worktree_dir: .worktrees

# State directory
state_dir: .soda

# Project context — injected into every phase system prompt
context:
  - AGENTS.md

# Phase-specific context — appended to the phase's system prompt
phase_context:
  plan:
    - docs/gotchas.md
  implement:
    - docs/gotchas.md
  verify:
    - docs/gotchas.md

# Repos and their conventions
repos:
  - name: my-service
    forge: github
    push_to: myuser/my-service
    target: myorg/my-service
    description: "Main service repo"
    formatter: "black --line-length 100"
    test_command: "pytest tests/"
    labels:
      - ai-assisted
    trailers:
      - "Assisted-by: SODA <noreply@soda.dev>"

  - name: my-docs
    forge: gitlab
    push_to: direct
    target: myorg/my-docs
    description: "Documentation"
    labels:
      - ai-assisted
    trailers:
      - "Assisted-by: SODA <noreply@soda.dev>"

# Monitor phase configuration
monitor:
  # Profile preset: conservative, smart, or aggressive
  # - conservative: 5min polls, 2 rounds, no auto-fix nits, no auto-rebase
  # - smart (default): 2min polls, 3 rounds, auto-fix nits, auto-rebase
  # - aggressive: 1min polls, 5 rounds, auto-fix nits, auto-rebase, respond to non-auth
  profile: smart

  # PR author username (for self-comment filtering)
  self_user: soda-bot

  # Known bot usernames to filter out
  bot_users:
    - dependabot
    - renovate
    - codecov

  # CODEOWNERS-based authority resolution (optional)
  # When set, only comments from file owners are treated as actionable.
  # If unset, all commenters are treated as authoritative.
  # codeowners: .github/CODEOWNERS

# Prompt overrides (optional)
# Place custom prompts in ~/.config/soda/prompts/<phase>.md
# They take precedence over built-in prompts.
