# ~/.config/soda/config.yaml
# Auto-generate a starter version of this file with: soda init

# Ticket source
ticket_source: github
github:
  owner: myorg
  repo: my-service
  fetch_comments: true
  # Extraction strategies: pull spec/plan from ticket comments using markers.
  # When configured, comments are scanned for content between start/end markers.
  # If multiple comments contain the same markers, the last one wins.
  spec:
    start_marker: "<!-- spec:start -->"
    end_marker: "<!-- spec:end -->"
  plan:
    start_marker: "<!-- plan:start -->"
    end_marker: "<!-- plan:end -->"

# Jira configuration (uncomment to use Jira instead)
# jira:
#   command: wtmcp
#   project: MYPROJECT
#   query: "labels = ai-workable AND status = Refinement"

# Default execution mode
mode: autonomous   # or "checkpoint"

# Model (used for all phases in v1)
model: claude-opus-4-6

# Authentication — optional keychain/vault-based credential injection.
# When api_key_helper is set, SODA writes a Claude Code settings file
# with apiKeyHelper pointing to this script. The script must print a
# valid API key to stdout. This avoids exporting ANTHROPIC_API_KEY in
# the shell environment.
# auth:
#   api_key_helper: /usr/local/bin/get-api-key

# Sandbox (via go-arapuca)
sandbox:
  enabled: true
  binary: agent-node
  limits:
    memory_mb: 2048
    cpu_percent: 200
    max_pids: 256

  # Environment passthrough: the sandbox automatically passes through these
  # variables from the calling shell — no config needed:
  #   GH_TOKEN / GITHUB_TOKEN  — for gh CLI (auto-extracted via `gh auth token` if unset)
  #   SSH_AUTH_SOCK             — for git push via SSH key
  #   GIT_AUTHOR_NAME / EMAIL, GIT_COMMITTER_NAME / EMAIL — for git commits
  #   ANTHROPIC_API_KEY         — for Claude Code API calls
  #
  # If submit/follow-up phases hang on gh auth, run: export GH_TOKEN=$(gh auth token)

  # LLM proxy — route API calls through a host-side proxy for
  # credential isolation, token metering, and budget enforcement.
  # When enabled, the sandbox uses full network isolation (UseNetNS: true)
  # and API calls are bridged through a Unix socket.
  proxy:
    enabled: false
    # upstream_url: https://api.anthropic.com  # default; or set ANTHROPIC_BASE_URL
    # max_input_tokens: 500000   # per-session input token budget; 0 = unlimited
    # max_output_tokens: 200000  # per-session output token budget; 0 = unlimited
    # log_dir: .soda/proxy-logs  # request/response audit log directory

# Budget and duration limits
limits:
  max_cost_per_ticket: 30.00
  # max_cost_per_phase: cumulative cap across ALL rework/patch generations of a phase.
  # Two review cycles ($3-5 each) can exceed a $8 limit. Raise to $15 for review-heavy
  # workflows, or disable (set to 0) and use max_cost_per_generation instead.
  max_cost_per_phase: 15.00
  # max_cost_per_generation: per-attempt cap that resets on each rework cycle.
  # Use this instead of (or alongside) max_cost_per_phase when you want to cap
  # individual attempts without limiting total rework cycles.
  # Tradeoff: max_cost_per_phase = hard ceiling on total phase spend;
  #           max_cost_per_generation = ceiling per attempt (total spend is unbounded).
  max_cost_per_generation: 8.00  # 0 or omitted means disabled
  max_pipeline_duration: "2h"    # max wall-clock time for the entire pipeline; empty or "0" means no limit
  max_api_concurrency: 2         # max concurrent API calls (e.g., parallel reviewers); 0 or omitted means unlimited

# Worktrees
worktree_dir: .worktrees

# State directory
state_dir: .soda

# Project context — injected into every phase system prompt
context:
  - AGENTS.md

# Phase-specific context — appended to the phase's system prompt
phase_context:
  plan:
    - docs/gotchas.md
  implement:
    - docs/gotchas.md
  verify:
    - docs/gotchas.md

# Repos and their conventions
repos:
  - name: my-service
    forge: github
    push_to: myuser/my-service
    target: myorg/my-service
    description: "Main service repo"
    formatter: "black --line-length 100"
    test_command: "pytest tests/"
    labels:
      - ai-assisted
    trailers:
      - "Assisted-by: SODA <noreply@soda.dev>"

  - name: my-docs
    forge: gitlab
    push_to: direct
    target: myorg/my-docs
    description: "Documentation"
    labels:
      - ai-assisted
    trailers:
      - "Assisted-by: SODA <noreply@soda.dev>"

# Monitor phase configuration
monitor:
  # Profile preset: conservative, smart, or aggressive
  # - conservative: 5min polls, 2 rounds, no auto-fix nits, no auto-rebase
  # - smart (default): 2min polls, 3 rounds, auto-fix nits, auto-rebase
  # - aggressive: 1min polls, 5 rounds, auto-fix nits, auto-rebase, respond to non-auth
  profile: smart

  # PR author username — required for active comment response.
  # Without self_user, monitor runs in passive mode: it polls CI status and
  # PR state, detects new comments and notifies you, but does NOT respond
  # automatically. Set self_user to enable active response mode.
  self_user: soda-bot

  # Known bot usernames to filter out
  bot_users:
    - dependabot
    - renovate
    - codecov

  # CODEOWNERS-based authority resolution (optional)
  # When set, only comments from file owners are treated as actionable.
  # If unset, all commenters are treated as authoritative.
  # codeowners: .github/CODEOWNERS

# Notification hooks — fired on pipeline completion (success or failure).
# Both webhook and script may be configured; they fire independently.
# Notifications are best-effort: failures are logged but do not affect
# the pipeline's exit status.
notify:
  # HTTP POST webhook — receives a JSON payload with pipeline results.
  webhook:
    url: https://hooks.example.com/soda
    headers:
      Authorization: "Bearer your-token"

  # Shell script callback — receives the same JSON payload on stdin.
  # Useful for desktop notifications, Slack messages, or custom integrations.
  script:
    command: "./scripts/on-complete.sh"

# Prompt overrides (optional)
# Place custom prompts in ~/.config/soda/prompts/<phase>.md
# They take precedence over built-in prompts.

# Phase-level overrides (optional) — these merge with your root phases.yaml.
# Example: enable active comment response in the monitor phase.
# phases:
#   monitor:
#     polling:
#       respond_to_comments: true   # enable active response (requires self_user above)
#       max_response_rounds: 3      # max Claude sessions for comment responses
#       max_duration: "4h"          # total monitor phase wall-clock limit
