# SODA Phase Pipeline Configuration
#
# Each phase defines: prompt template, output schema, tool scope,
# timeout, retry policy, and dependencies on previous phase artifacts.

# model_routing: optional quality gate for automatic model escalation.
# When a per-phase model produces repeated parse failures exceeding
# fallback_threshold, the engine switches to the global model mid-retry.
# model_routing:
#   fallback_threshold: 2  # escalate after 2 consecutive parse failures

phases:
  - name: triage
    prompt: prompts/triage.md
    schema: |
      {"type":"object","properties":{"ticket_key":{"type":"string"},"repo":{"type":"string"},"code_area":{"type":"string"},"files":{"type":"array","items":{"type":"string"}},"complexity":{"type":"string","enum":["low","medium","high"]},"approach":{"type":"string"},"risks":{"type":"array","items":{"type":"string"}},"automatable":{"type":"string","enum":["yes","no","partial"]},"block_reason":{"type":"string"},"skip_plan":{"type":"boolean","default":false}},"required":["ticket_key","repo","code_area","files","complexity","approach","risks","automatable"]}
    tools:
      - Read
      - Glob
      - Grep
      - Bash(git:*)
      - Bash(ls:*)
    timeout: 3m
    retry:
      transient: 2
      parse: 1
      semantic: 1
    depends_on: []

  - name: plan
    prompt: prompts/plan.md
    # condition: Go text/template evaluated at runtime; output "false" skips
    # the phase. Available fields: .Complexity, .Automatable, .ReworkCycle.
    # Example: skip plan for low-complexity tickets:
    # condition: '{{ ne .Complexity "low" }}'
    schema: |
      {"type":"object","properties":{"ticket_key":{"type":"string"},"approach":{"type":"string"},"tasks":{"type":"array","items":{"type":"object","properties":{"id":{"type":"string"},"description":{"type":"string"},"files":{"type":"array","items":{"type":"string"}},"done_when":{"type":"string"},"depends_on":{"type":"array","items":{"type":"string"}}},"required":["id","description","files","done_when"]}},"verification":{"type":"object","properties":{"commands":{"type":"array","items":{"type":"string"}},"manual_steps":{"type":"array","items":{"type":"string"}}},"required":["commands"]},"deviations":{"type":"array","items":{"type":"string"}}},"required":["ticket_key","approach","tasks","verification"]}
    tools:
      - Read
      - Glob
      - Grep
      - Bash(git:*)
      - Bash(ls:*)
    timeout: 8m
    retry:
      transient: 2
      parse: 1
      semantic: 1
    depends_on:
      - triage

  - name: implement
    prompt: prompts/implement.md
    schema: |
      {"type":"object","properties":{"ticket_key":{"type":"string"},"branch":{"type":"string"},"commits":{"type":"array","items":{"type":"object","properties":{"hash":{"type":"string"},"message":{"type":"string"},"task_id":{"type":"string"}},"required":["hash","message","task_id"]}},"files_changed":{"type":"array","items":{"type":"object","properties":{"path":{"type":"string"},"action":{"type":"string"}},"required":["path","action"]}},"task_results":{"type":"array","items":{"type":"object","properties":{"task_id":{"type":"string"},"status":{"type":"string"},"reason":{"type":"string"}},"required":["task_id","status"]}},"tests_passed":{"type":"boolean"},"test_output":{"type":"string"},"deviations":{"type":"array","items":{"type":"string"}}},"required":["ticket_key","branch","commits","files_changed","task_results","tests_passed"]}
    tools:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - Bash
    timeout: 15m
    # timeout_overrides: evaluate conditions in order; first match overrides the base timeout.
    # Conditions use Go text/template syntax. Available fields: .Complexity, .Automatable, .ReworkCycle.
    # NOTE: use {{ eq .Complexity "low" }}, NOT {{ .Complexity == "low" }} (invalid Go template).
    # timeout_overrides:
    #   - condition: '{{ eq .Complexity "low" }}'
    #     timeout: 10m
    #   - condition: '{{ eq .Complexity "medium" }}'
    #     timeout: 20m
    # model_overrides: evaluate conditions in order; first match overrides the phase/global model.
    # Conditions use Go text/template syntax. Available fields: .Complexity, .Automatable, .ReworkCycle.
    # NOTE: use .Complexity (not .Artifacts.Triage.Complexity) — phaseConditionData flattens triage fields.
    # model_overrides:
    #   - condition: '{{ eq .Complexity "low" }}'
    #     model: claude-sonnet-4-6
    #   - condition: '{{ eq .Complexity "high" }}'
    #     model: claude-opus-4-6
    retry:
      transient: 2
      parse: 1
      semantic: 0    # don't retry semantic failures — human decides
    depends_on:
      - plan
    feedback_from:
      - review
      - verify

  - name: patch
    type: corrective
    prompt: prompts/patch.md
    model: claude-sonnet-4-6
    schema: |
      {"type":"object","properties":{"ticket_key":{"type":"string"},"fix_results":{"type":"array","items":{"type":"object","properties":{"fix_index":{"type":"integer"},"status":{"type":"string"},"description":{"type":"string"},"reason":{"type":"string"}},"required":["fix_index","status","description"]}},"files_changed":{"type":"array","items":{"type":"object","properties":{"path":{"type":"string"},"action":{"type":"string"}},"required":["path","action"]}},"tests_passed":{"type":"boolean"},"too_complex":{"type":"boolean"},"too_complex_reason":{"type":"string"}},"required":["ticket_key","fix_results","files_changed","tests_passed","too_complex"]}
    tools:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - Bash
    timeout: 8m
    retry:
      transient: 2
      parse: 1
      semantic: 0
    depends_on:
      - implement
    feedback_from:
      - verify

  - name: verify
    prompt: prompts/verify.md
    schema: |
      {"type":"object","properties":{"ticket_key":{"type":"string"},"verdict":{"type":"string"},"criteria_results":{"type":"array","items":{"type":"object","properties":{"criterion":{"type":"string"},"passed":{"type":"boolean"},"evidence":{"type":"string"}},"required":["criterion","passed","evidence"]}},"command_results":{"type":"array","items":{"type":"object","properties":{"command":{"type":"string"},"exit_code":{"type":"integer"},"output":{"type":"string"},"passed":{"type":"boolean"}},"required":["command","exit_code","output","passed"]}},"code_issues":{"type":"array","items":{"type":"object","properties":{"file":{"type":"string"},"line":{"type":"integer"},"severity":{"type":"string"},"issue":{"type":"string"},"suggested_fix":{"type":"string"}},"required":["file","severity","issue"]}},"fixes_required":{"type":"array","items":{"type":"string"}}},"required":["ticket_key","verdict","criteria_results","command_results"]}
    tools:
      - Read
      - Glob
      - Grep
      - Bash
    timeout: 8m
    retry:
      transient: 2
      parse: 1
      semantic: 1
    corrective:
      phase: patch
      max_attempts: 2
      on_exhausted: stop
      escalate_to: implement
    depends_on:
      - plan
      - implement

  - name: review
    type: parallel-review
    schema: |
      {"type":"object","properties":{"ticket_key":{"type":"string"},"findings":{"type":"array","items":{"type":"object","properties":{"severity":{"type":"string"},"file":{"type":"string"},"line":{"type":"integer"},"issue":{"type":"string"},"suggestion":{"type":"string"}},"required":["severity","file","issue","suggestion"]}},"verdict":{"type":"string"}},"required":["ticket_key","findings","verdict"]}
    tools:
      - Read
      - Glob
      - Grep
      - Bash
    timeout: 12m
    retry:
      transient: 2
      parse: 1
      semantic: 1
    depends_on:
      - plan
      - implement
      - verify
    min_reviewers: 1  # phase succeeds if at least 1 reviewer passes; tolerate partial failures
    reviewers:
      - name: go-specialist
        prompt: prompts/review-go.md
        focus: "Go idioms, error handling, interface design, test quality, performance"
      - name: ai-harness
        prompt: prompts/review-harness.md
        focus: "prompt engineering, context budget, Claude CLI integration, sandbox, structured output"
        condition: '{{ ne .Complexity "low" }}'
    rework:
      target: implement

  - name: submit
    prompt: prompts/submit.md
    schema: |
      {"type":"object","properties":{"ticket_key":{"type":"string"},"pr_url":{"type":"string"},"pr_number":{"type":"integer"},"title":{"type":"string"},"branch":{"type":"string"},"target":{"type":"string"},"forge":{"type":"string"}},"required":["ticket_key","pr_url","pr_number","title","branch","target","forge"]}
    tools:
      - Bash(git:*)
      - Bash(gh:*)
      - Bash(glab:*)
    timeout: 3m
    retry:
      transient: 2
      parse: 1
      semantic: 0
    depends_on:
      - implement
      - verify
      - review

  - name: follow-up
    type: post-submit
    prompt: prompts/follow-up.md
    tools:
      - Bash(gh:*)
    timeout: 3m
    retry:
      transient: 2
      parse: 1
      semantic: 0
    depends_on:
      - review
      - submit

  - name: monitor
    prompt: prompts/monitor.md
    type: polling
    tools:
      - Read
      - Write
      - Edit
      - Glob
      - Grep
      - Bash
    timeout: 10m
    polling:
      initial_interval: 2m
      max_interval: 5m
      escalate_after: 30m
      max_duration: 4h
      max_response_rounds: 3
      respond_to_comments: false  # enable to classify and respond to PR comments (requires self_user)
      auto_merge: false           # enable to auto-merge when CI green + approved (see #338)
    retry:
      transient: 2
      parse: 1
      semantic: 0
    depends_on:
      - submit
      - plan
