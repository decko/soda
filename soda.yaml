# SODA configuration for the soda project itself

# Ticket source
ticket_source: github
github:
  owner: decko
  repo: soda

# Default execution mode
mode: autonomous

# Model — Sonnet as default, Opus for implement and review only
model: claude-sonnet-4-6

# Sandbox
sandbox:
  enabled: true
  limits:
    memory_mb: 2048
    cpu_percent: 200
    max_pids: 256
  proxy:
    enabled: true

# Budget
limits:
  max_cost_per_ticket: 25.00
  max_cost_per_phase: 12.00

# Worktrees
worktree_dir: .worktrees

# State directory
state_dir: .soda

# Project context — injected into every phase system prompt
context:
  - AGENTS.md

# Phase-specific context
phase_context:
  plan:
    - docs/gotchas.md
  implement:
    - docs/gotchas.md
  verify:
    - docs/gotchas.md

# Repos
repos:
  - name: soda
    forge: github
    push_to: decko/soda
    target: decko/soda
    description: "Session-Orchestrated Development Agent"
    formatter: "gofmt -w ."
    test_command: "go test ./..."
    labels:
      - ai-assisted
    trailers:
      - "Assisted-by: SODA"

# Convention checklist — injected into implement prompts (#475)
convention_checklist: |
  - Errors: wrap with fmt.Errorf("context: %w", err), never discard
  - Interfaces: define at consumer, not producer; keep minimal
  - Variables: no single-char names; use descriptive names in loops
  - Tests: functional over mocks, table-driven, TDD (write tests first)
  - Formatting: gofmt only (no extra flags)
  - Commits: one logical change per commit, reference ticket key
