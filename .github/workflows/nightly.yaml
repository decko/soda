name: Nightly

on:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC daily
  workflow_dispatch: # manual trigger

permissions:
  contents: write

env:
  GIT_LFS_SKIP_SMUDGE: "1"

jobs:
  check-changes:
    name: Check for changes
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check for commits in last 24h
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          elif git log --since="24 hours ago" --oneline | grep -q .; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

  nightly:
    name: Nightly Build
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            cgo: "1"
            suffix: linux-amd64-sandbox
          - goos: linux
            goarch: arm64
            cgo: "0"
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            cgo: "0"
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            cgo: "0"
            suffix: darwin-arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache: true

      - name: Install gcc (cgo builds)
        if: matrix.cgo == '1'
        run: sudo apt-get update && sudo apt-get install -y gcc pkg-config

      - name: Install Rust toolchain (cgo builds)
        if: matrix.cgo == '1'
        uses: dtolnay/rust-toolchain@stable

      - name: Build and install libarapuca (cgo builds)
        if: matrix.cgo == '1'
        run: |
          git clone --depth 1 https://github.com/sergio-correia/arapuca /tmp/arapuca
          cd /tmp/arapuca
          cargo install cbindgen
          make install PREFIX=$HOME/.local
          echo "PKG_CONFIG_PATH=$HOME/.local/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          date_tag="$(date -u +%Y%m%d)"
          short_sha="${GITHUB_SHA:0:8}"
          version="nightly-${date_tag}-${short_sha}"
          go build -ldflags "-s -w -X main.version=${version}" \
            -o soda-${{ matrix.suffix }} ./cmd/soda

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: soda-${{ matrix.suffix }}
          path: soda-${{ matrix.suffix }}

  publish:
    name: Publish Nightly
    needs: nightly
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum soda-* > checksums.txt

      - name: Delete previous nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true

      - name: Create nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          date_tag="$(date -u +%Y%m%d)"
          short_sha="${GITHUB_SHA:0:8}"

          gh release create nightly \
            --prerelease \
            --title "soda nightly (${date_tag})" \
            --notes "## Nightly build — $(date -u +%Y-%m-%d)

          **⚠️ Unstable** — built from main at \`${short_sha}\`. Use tagged releases for production.

          Binaries with \`-sandbox\` in the name include kernel-enforced process isolation. Other builds run without sandbox.

          Automatically replaced on each nightly build." \
            --target "$GITHUB_SHA" \
            dist/*
