name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GIT_LFS_SKIP_SMUDGE: "1"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            cgo: "1"
            suffix: linux-amd64-sandbox
          - goos: linux
            goarch: arm64
            cgo: "0"
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            cgo: "0"
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            cgo: "0"
            suffix: darwin-arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache: true

      - name: Install gcc (cgo builds)
        if: matrix.cgo == '1'
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Fetch go-arapuca LFS binary (cgo builds)
        if: matrix.cgo == '1'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mod_dir="$(go env GOMODCACHE)/github.com/sergio-correia/go-arapuca@$(go list -m -f '{{.Version}}' github.com/sergio-correia/go-arapuca)"
          lib_path="${mod_dir}/lib/linux_amd64/libarapuca.a"
          if [ -f "$lib_path" ] && file "$lib_path" | grep -q "ASCII"; then
            oid=$(awk '/^oid sha256:/{print substr($2,8)}' "$lib_path")
            url="https://github.com/sergio-correia/go-arapuca.git/info/lfs/objects/batch"
            response=$(curl -s -X POST "$url" \
              -H "Content-Type: application/vnd.git-lfs+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -d "{\"operation\":\"download\",\"objects\":[{\"oid\":\"${oid}\",\"size\":1}]}")
            download_url=$(echo "$response" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['objects'][0]['actions']['download']['href'])" 2>/dev/null) || {
              echo "::warning::Failed to fetch LFS binary — sandbox build will be skipped"
              echo "LFS API response: $response"
              exit 1
            }
            chmod u+w "$(dirname "$lib_path")"
            chmod u+w "$lib_path"
            curl -sL "$download_url" -o "$lib_path"
            echo "Fetched libarapuca.a ($(wc -c < "$lib_path") bytes)"
          fi

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          go build -ldflags "-s -w -X main.version=${version}" \
            -o soda-${{ matrix.suffix }} ./cmd/soda

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: soda-${{ matrix.suffix }}
          path: soda-${{ matrix.suffix }}

  publish:
    name: Publish Release
    needs: release
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum soda-* > checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "soda ${version}" \
            --notes "## soda ${version}

          Binaries with \`-sandbox\` in the name include kernel-enforced process isolation (Landlock + seccomp + cgroups). Builds without it run normally but skip sandbox enforcement.

          | Binary | Platform | Sandbox |
          |--------|----------|---------|
          | \`soda-linux-amd64-sandbox\` | Linux x86_64 | ✅ |
          | \`soda-linux-arm64\` | Linux ARM64 | ❌ |
          | \`soda-darwin-amd64\` | macOS Intel | ❌ |
          | \`soda-darwin-arm64\` | macOS Apple Silicon | ❌ |

          See checksums.txt for SHA-256 verification." \
            dist/*

  copr:
    name: COPR RPM Build
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      COPR_API_TOKEN: ${{ secrets.COPR_API_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        spec:
          - soda
          - soda-minimal
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install RPM tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install copr-cli
        run: pip3 install copr-cli

      - name: Create source tarball
        run: |
          version="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="soda-${version}/" \
            -o "soda-${version}.tar.gz" HEAD

      - name: Build SRPM
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p rpmbuild/{SOURCES,SRPMS,SPECS}
          cp "soda-${version}.tar.gz" rpmbuild/SOURCES/
          cp packaging/rpm/${{ matrix.spec }}.spec rpmbuild/SPECS/
          rpmbuild -bs \
            --define "_topdir $(pwd)/rpmbuild" \
            --define "soda_version ${version}" \
            rpmbuild/SPECS/${{ matrix.spec }}.spec

      - name: Configure copr-cli
        if: ${{ env.COPR_API_TOKEN != '' }}
        run: |
          mkdir -p ~/.config
          echo "$COPR_API_TOKEN" > ~/.config/copr

      - name: Submit to COPR
        if: ${{ env.COPR_API_TOKEN != '' }}
        run: |
          srpm=$(find rpmbuild/SRPMS -name '*.src.rpm' | head -1)
          copr-cli build soda "$srpm"
