name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GIT_LFS_SKIP_SMUDGE: "1"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            cgo: "0"
            suffix: linux-amd64
          - goos: linux
            goarch: amd64
            cgo: "1"
            suffix: linux-amd64-sandbox
          - goos: linux
            goarch: arm64
            cgo: "0"
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            cgo: "0"
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            cgo: "0"
            suffix: darwin-arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          cache: true

      - name: Install gcc (cgo builds)
        if: matrix.cgo == '1'
        run: sudo apt-get update && sudo apt-get install -y gcc pkg-config

      - name: Install Rust toolchain (cgo builds)
        if: matrix.cgo == '1'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Build and install libarapuca (cgo builds)
        if: matrix.cgo == '1'
        run: |
          git clone --depth 1 --branch v0.1.1 https://github.com/sergio-correia/arapuca /tmp/arapuca
          cd /tmp/arapuca
          cargo install cbindgen
          make install PREFIX=$HOME/.local
          echo "PKG_CONFIG_PATH=$HOME/.local/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          go build -ldflags "-s -w -X main.version=${version}" \
            -o soda-${{ matrix.suffix }} ./cmd/soda

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: soda-${{ matrix.suffix }}
          path: soda-${{ matrix.suffix }}

  publish:
    name: Publish Release
    needs: release
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: |
          if ls soda-* 1>/dev/null 2>&1; then
            sha256sum soda-* > checksums.txt
          else
            echo "No binaries found — skipping checksums"
            exit 1
          fi

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"

          # Try uploading to an existing release first (created manually with milestone title).
          # If no release exists, create one with a default title.
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME exists — uploading assets"
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            echo "Release $GITHUB_REF_NAME not found — creating"
            gh release create "$GITHUB_REF_NAME" \
              --title "soda ${version}" \
              --generate-notes \
              dist/*
          fi

  copr:
    name: COPR RPM Build
    needs: release
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      COPR_API_TOKEN: ${{ secrets.COPR_API_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        spec:
          - soda
          - soda-minimal
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install RPM tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install copr-cli
        run: pip3 install copr-cli

      - name: Create source tarball
        run: |
          version="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="soda-${version}/" \
            -o "soda-${version}.tar.gz" HEAD

      - name: Build SRPM
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p rpmbuild/{SOURCES,SRPMS,SPECS}
          cp "soda-${version}.tar.gz" rpmbuild/SOURCES/
          cp packaging/rpm/${{ matrix.spec }}.spec rpmbuild/SPECS/
          rpmbuild -bs \
            --define "_topdir $(pwd)/rpmbuild" \
            --define "soda_version ${version}" \
            rpmbuild/SPECS/${{ matrix.spec }}.spec

      - name: Configure copr-cli
        if: ${{ env.COPR_API_TOKEN != '' }}
        run: |
          mkdir -p ~/.config
          echo "$COPR_API_TOKEN" > ~/.config/copr

      - name: Submit to COPR
        if: ${{ env.COPR_API_TOKEN != '' }}
        run: |
          srpm=$(find rpmbuild/SRPMS -name '*.src.rpm' | head -1)
          copr-cli build soda "$srpm"
