ticket_source: jira
jira:
  command: wtmcp
  project: MYPROJECT
  query: "labels = ai-workable AND status = Refinement"
  extraction:
    spec:
      start_marker: "<!-- spec:start -->"
      end_marker: "<!-- spec:end -->"
    plan:
      start_marker: "<!-- plan:start -->"
      end_marker: "<!-- plan:end -->"
    spec_field: "customfield_10050"
    plan_field: "customfield_10051"
    subtask_field: "subtasks"
github:
  owner: myorg
  repo: my-service
  fetch_comments: true
  spec:
    start_marker: "<!-- spec:start -->"
    end_marker: "<!-- spec:end -->"
  plan:
    start_marker: "<!-- plan:start -->"
    end_marker: "<!-- plan:end -->"
mode: autonomous
model: claude-opus-4-6
sandbox:
  enabled: true
  binary: agent-node
  limits:
    memory_mb: 2048
    cpu_percent: 200
    max_pids: 256
limits:
  max_cost_per_ticket: 15.00
  max_cost_per_phase: 8.00
worktree_dir: .worktrees
state_dir: .soda
context:
  - AGENTS.md
phase_context:
  plan:
    - docs/gotchas.md
  implement:
    - docs/gotchas.md
repos:
  - name: my-service
    forge: github
    push_to: myuser/my-service
    target: myorg/my-service
    description: "Main service repo"
    formatter: "black --line-length 100"
    test_command: "pytest tests/"
    labels:
      - ai-assisted
    trailers:
      - "Assisted-by: SODA <noreply@soda.dev>"
monitor:
  profile: smart
  self_user: soda-bot
  bot_users:
    - dependabot
    - renovate
  codeowners: .github/CODEOWNERS
